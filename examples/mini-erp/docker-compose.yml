version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: erpforge
      POSTGRES_PASSWORD: erpforge123
      POSTGRES_DB: mini_erp
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - '3000:3000'
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgres://erpforge:erpforge123@postgres:5432/mini_erp
      PORT: 3000

volumes:
  pgdata:
